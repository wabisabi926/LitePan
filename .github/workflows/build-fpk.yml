name: Build FPK Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --target=litepan-fpk/litepan-amd64/app/server/libs -r litepan-fpk/litepan-amd64/app/server/requirements.txt

      - name: Build amd64 FPK
        run: |
          cd litepan-fpk/litepan-amd64
          python3 -c "import json; config = {'.url': {'litepan.Application': {'title': 'LitePan', 'icon': 'images/icon_{0}.png', 'type': 'url', 'protocol': '', 'port': '${LITEPAN_PORT}', 'url': '/', 'allUsers': False}}}; json.dump(config, open('app/ui/config', 'w'))"
          cat app/ui/config
          chmod +x cmd/*
          cp ../../fnpack_linux/fnpack_linux_amd64 fnpack
          chmod +x fnpack
          ./fnpack build
          cp litepan.fpk ../litepan_amd64.fpk

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: litepan-amd64
          path: litepan-fpk/litepan_amd64.fpk

  build-arm64:
    runs-on: ubuntu-latest-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir --target=litepan-fpk/litepan-arm64/app/server/libs -r litepan-fpk/litepan-arm64/app/server/requirements.txt

      - name: Build arm64 FPK
        run: |
          cd litepan-fpk/litepan-arm64
          python3 -c "import json; config = {'.url': {'litepan.Application': {'title': 'LitePan', 'icon': 'images/icon_{0}.png', 'type': 'url', 'protocol': '', 'port': '${LITEPAN_PORT}', 'url': '/', 'allUsers': False}}}; json.dump(config, open('app/ui/config', 'w'))"
          cat app/ui/config
          chmod +x cmd/*
          cp ../../fnpack_linux/fnpack_linux_arm64 fnpack
          chmod +x fnpack
          ./fnpack build
          cp litepan.fpk ../litepan_arm64.fpk

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: litepan-arm64
          path: litepan-fpk/litepan_arm64.fpk

  release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.4.3
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          files: |
            artifacts/litepan-amd64/litepan_amd64.fpk
            artifacts/litepan-arm64/litepan_arm64.fpk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
